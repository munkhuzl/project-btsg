query GetUser {
    getUser {
        _id
        email
        password
        firstname
        lastname
        role
        position
        phoneNumber
        otp
        passwordResetToken
        passwordResetTokenExpire
        age
        birthDate
        home_address
        workPlace {
            city
            state
            company_name
            principal_name
        }
        school {
            city
            state
            school_number
            class
        }
        createdAt
        updatedAt
    }
}

mutation Login($input: LoginInput!) {
    login(input: $input) {
        user {
            email
        }
        message
        token
    }
}

mutation SignUp($input: SignUpInput!) {
    signUp(input: $input) {
        email
    }
}

mutation CheckOTP($email: String!, $otp: String!) {
    checkOTP(email: $email, OTP: $otp) {
        message
        token
    }
}

query GetAllRequests {
    getAllRequests {
        _id
        email
        firstname
        lastname
        userId
        requestTypeId
        requestTypeDetail {
            _id
            name
            description
            fields {
                id
                label
                type
                required
            }
        }
        startTime
        endTime
        fieldValues {
            fieldId
            value
        }
        result
        comment
        createdAt
        updatedAt
    }
}

query GetRequestByUserID {
    getRequestByUserID {
        _id
        email
        firstname
        lastname
        userId
        requestTypeId
        requestTypeDetail {
            _id
            name
            description
            fields {
                id
                label
                type
                required
            }
        }
        startTime
        endTime
        fieldValues {
            fieldId
            value
        }
        attachments
        result
        comment
        requestNumber
        createdAt
        updatedAt
    }
}

query GetRequestTypeTemplates {
    getRequestTypeTemplates {
        _id
        name
        description
        fields {
            id
            label
            type
            required
        }
    }
}

query GetGlobalFields {
    getGlobalFields {
        _id
        id
        label
        type
        required
    }
}

mutation SentRequest($input: SendRequestInput!) {
    sentRequest(input: $input) {
        message
        success
    }
}

mutation ForgotPassword($email: String!) {
    forgotPassword(email: $email) {
        message
    }
}

mutation ResetPassword($email: String!, $otp: String!, $newPassword: String!) {
    resetPassword(email: $email, OTP: $otp, newPassword: $newPassword) {
        message
    }
}